# Reverse proxy: API (host:3001) + web app (host:3000) behind one origin
upstream piramida_api {
  server host.docker.internal:3001;
  keepalive 16;
}

upstream piramida_web {
  server host.docker.internal:3000;
  keepalive 16;
}

server {
  listen 80;
  server_name _;
  server_tokens off;

  # Text assets shrink ~5-8x; woff2/webp are already compressed (not listed)
  gzip on;
  gzip_types application/json text/plain text/css application/javascript image/svg+xml;
  gzip_min_length 1024;
  gzip_proxied any;

  # WebSocket upgrade for live availability (longest-prefix match wins over /api/)
  location = /api/ws {
    proxy_pass http://piramida_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Long-lived connections; the API pings every 30s
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
  }

  location /api/ {
    proxy_pass http://piramida_api;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  location /health {
    proxy_pass http://piramida_api;
    proxy_set_header Host $host;
  }

  # Container liveness only — does not depend on the host API being up
  location = /nginx-health {
    access_log off;
    return 200 'ok';
  }

  # Hashed build assets are immutable — cache aggressively
  location /assets/ {
    proxy_pass http://piramida_web;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Fonts are versioned by filename; safe to cache long
  location /fonts/ {
    proxy_pass http://piramida_web;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    expires 30d;
    add_header Cache-Control "public";
  }

  location / {
    proxy_pass http://piramida_web;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }
}
