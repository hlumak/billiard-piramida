services:
  postgres:
    # Pinned: the pgdata volume uses the postgres:18 on-disk layout (/var/lib/postgresql)
    image: postgres:18
    container_name: piramida-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: piramida
      POSTGRES_PASSWORD: piramida
      POSTGRES_DB: piramida
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U piramida -d piramida']
      interval: 5s
      timeout: 3s
      retries: 10

  nginx:
    image: nginx:1.28-alpine
    container_name: piramida-nginx
    restart: unless-stopped
    ports:
      - '127.0.0.1:8080:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost/nginx-health || exit 1']
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
